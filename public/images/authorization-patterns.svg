  <line x1="60" y1="304" x2="380" y2="304" stroke="#818cf8" stroke-opacity="0.15" stroke-width="1"/>

  <!-- RBAC diagram: user → role → permissions -->
  <rect x="100" y="320" width="70" height="32" rx="6" fill="url(#rbacGrad)" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="135" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">User</text>

  <line x1="170" y1="336" x2="205" y2="336" stroke="#818cf8" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowIndigo)"/>

  <rect x="210" y="320" width="70" height="32" rx="6" fill="url(#rbacGrad)" stroke="#818cf8" stroke-opacity="0.5" stroke-width="1"/>
  <text x="245" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#c7d2fe">Role</text>

  <line x1="280" y1="336" x2="310" y2="322" stroke="#818cf8" stroke-width="1" opacity="0.5" marker-end="url(#arrowIndigo)"/>
  <line x1="280" y1="336" x2="310" y2="336" stroke="#818cf8" stroke-width="1" opacity="0.5" marker-end="url(#arrowIndigo)"/>
  <line x1="280" y1="336" x2="310" y2="350" stroke="#818cf8" stroke-width="1" opacity="0.5" marker-end="url(#arrowIndigo)"/>

