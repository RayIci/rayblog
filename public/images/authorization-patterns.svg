<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0e0c14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#16131f"/>
    </linearGradient>
    <linearGradient id="rbacGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="abacGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#065f46" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="rebacGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#92400e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.5"/>
    </linearGradient>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="#0e0c14"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
    <circle cx="18" cy="18" r="0.9" fill="#6366f1" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ─── Title area ─── -->
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="12" letter-spacing="5" fill="#6366f1" opacity="0.85">AUTHORIZATION PATTERNS</text>
  <text x="600" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="50" font-weight="700" fill="#f1f5f9" letter-spacing="-1.5">RBAC · ABAC · ReBAC</text>

  <!-- ─── Central question ─── -->
  <rect x="410" y="160" width="380" height="44" rx="22" fill="url(#cardGrad)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="187" text-anchor="middle" font-family="monospace" font-size="12" fill="#a5b4fc">can( subject, action, resource ) → ?</text>

  <!-- ─── RBAC Column (left) ─── -->
  <rect x="60" y="240" width="320" height="290" rx="14" fill="url(#cardGrad)" stroke="#818cf8" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="220" y="272" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#c7d2fe">RBAC</text>
