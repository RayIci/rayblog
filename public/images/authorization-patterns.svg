  <text x="340" y="339" font-family="monospace" font-size="8" fill="#818cf8" opacity="0.7">perm:b</text>
  <text x="340" y="353" font-family="monospace" font-size="8" fill="#818cf8" opacity="0.7">perm:c</text>

  <!-- RBAC description -->
  <text x="220" y="390" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">"What is your role?"</text>
  <text x="220" y="410" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Global permissions</text>
  <text x="220" y="425" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Simple lookup</text>
  <text x="220" y="440" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">No resource scoping</text>

