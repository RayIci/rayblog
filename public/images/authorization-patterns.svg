  <line x1="622" y1="354" x2="658" y2="354" stroke="#34d399" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowGreen)"/>

  <rect x="664" y="342" width="56" height="24" rx="6" fill="#064e3b" stroke="#34d399" stroke-opacity="0.4" stroke-width="1"/>
  <text x="692" y="358" text-anchor="middle" font-family="monospace" font-size="8" fill="#6ee7b7">allow?</text>

