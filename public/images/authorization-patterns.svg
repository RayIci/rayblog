  <text x="580" y="445" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Contextual rules</text>
  <text x="580" y="460" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Policy-as-code</text>

