  <line x1="504" y1="327" x2="544" y2="350" stroke="#34d399" stroke-width="1" opacity="0.5" marker-end="url(#arrowGreen)"/>
  <line x1="504" y1="355" x2="544" y2="355" stroke="#34d399" stroke-width="1" opacity="0.5" marker-end="url(#arrowGreen)"/>
  <line x1="504" y1="383" x2="544" y2="360" stroke="#34d399" stroke-width="1" opacity="0.5" marker-end="url(#arrowGreen)"/>

