  <text x="940" y="292" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24" opacity="0.7">Relationship-Based</text>
  <line x1="780" y1="304" x2="1100" y2="304" stroke="#fbbf24" stroke-opacity="0.15" stroke-width="1"/>

