  <rect x="535" y="508" width="30" height="6" rx="3" fill="#34d399" opacity="0.7"/>
  <rect x="570" y="508" width="30" height="6" rx="3" fill="#34d399" opacity="0.2"/>
  <text x="630" y="514" font-family="monospace" font-size="8" fill="#64748b">complexity</text>

