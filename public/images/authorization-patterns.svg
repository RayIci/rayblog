  <rect x="140" y="498" width="30" height="6" rx="3" fill="#818cf8" opacity="0.7"/>
  <rect x="175" y="498" width="30" height="6" rx="3" fill="#818cf8" opacity="0.2"/>
  <rect x="210" y="498" width="30" height="6" rx="3" fill="#818cf8" opacity="0.2"/>
  <text x="270" y="504" font-family="monospace" font-size="8" fill="#64748b">complexity</text>

