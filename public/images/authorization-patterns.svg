  <circle cx="850" cy="340" r="16" fill="url(#rebacGrad)" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1"/>
  <text x="850" y="344" text-anchor="middle" font-family="monospace" font-size="7" fill="#fde68a">user</text>

  <circle cx="940" cy="320" r="16" fill="url(#rebacGrad)" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1"/>
  <text x="940" y="324" text-anchor="middle" font-family="monospace" font-size="7" fill="#fde68a">org</text>

  <circle cx="940" cy="368" r="16" fill="url(#rebacGrad)" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1"/>
  <text x="940" y="372" text-anchor="middle" font-family="monospace" font-size="7" fill="#fde68a">shop</text>

  <circle cx="1040" cy="344" r="16" fill="url(#rebacGrad)" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1"/>
  <text x="1040" y="348" text-anchor="middle" font-family="monospace" font-size="7" fill="#fde68a">prod</text>

  <!-- ReBAC edges -->
  <line x1="866" y1="336" x2="924" y2="324" stroke="#fbbf24" stroke-width="1" opacity="0.5" marker-end="url(#arrowAmber)"/>
  <line x1="866" y1="346" x2="924" y2="364" stroke="#fbbf24" stroke-width="1" opacity="0.5" marker-end="url(#arrowAmber)"/>
  <line x1="952" y1="332" x2="948" y2="352" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
  <line x1="956" y1="368" x2="1024" y2="350" stroke="#fbbf24" stroke-width="1" opacity="0.5" marker-end="url(#arrowAmber)"/>

  <text x="895" y="324" text-anchor="middle" font-family="monospace" font-size="6" fill="#fbbf24" opacity="0.7">admin</text>
  <text x="898" y="362" text-anchor="middle" font-family="monospace" font-size="6" fill="#fbbf24" opacity="0.7">collab</text>
  <text x="965" y="346" text-anchor="middle" font-family="monospace" font-size="6" fill="#fbbf24" opacity="0.5">parent</text>

  <!-- ReBAC description -->
  <text x="940" y="410" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">"What is your relationship?"</text>
  <text x="940" y="430" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Graph traversal</text>
  <text x="940" y="445" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Permission inheritance</text>
  <text x="940" y="460" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Reverse lookups</text>

  <!-- ReBAC tech -->
  <rect x="820" y="472" width="240" height="24" rx="4" fill="#78350f" stroke="#fbbf24" stroke-opacity="0.2" stroke-width="1"/>
  <text x="940" y="488" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">SpiceDB · OpenFGA · Zanzibar</text>

  <!-- Complexity indicator -->
  <rect x="860" y="508" width="30" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="895" y="508" width="30" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="930" y="508" width="30" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <text x="990" y="514" font-family="monospace" font-size="8" fill="#64748b">complexity</text>

  <!-- ─── Progression arrows ─── -->
  <line x1="385" y1="385" x2="415" y2="385" stroke="#6366f1" stroke-width="1.5" opacity="0.4" marker-end="url(#arrowIndigo)"/>
  <line x1="745" y1="385" x2="775" y2="385" stroke="#6366f1" stroke-width="1.5" opacity="0.4" marker-end="url(#arrowIndigo)"/>

  <!-- ─── Bottom tag row ─── -->
  <rect x="200" y="560" width="800" height="1" rx="0.5" fill="#6366f1" opacity="0.12"/>
  <text x="600" y="595" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b7280">
    roles · policies · relationships · OPA · Cerbos · SpiceDB · OpenFGA · Zanzibar
  </text>
