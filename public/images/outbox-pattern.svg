<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0e0c14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#16131f"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="outboxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="brokerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#065f46" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.6"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="#0e0c14"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
    <circle cx="18" cy="18" r="0.9" fill="#6366f1" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ─── Title area ─── -->
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="12" letter-spacing="5" fill="#6366f1" opacity="0.85">DISTRIBUTED SYSTEMS PATTERN</text>
  <text x="600" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="58" font-weight="700" fill="#f1f5f9" letter-spacing="-1.5">The Outbox Pattern</text>

  <!-- ─── Service box (left) ─── -->
  <rect x="60" y="200" width="280" height="300" rx="12" fill="url(#cardGrad)" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="200" y="230" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#c7d2fe">Service</text>
  <line x1="60" y1="240" x2="340" y2="240" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>

  <!-- DB cylinder (orders) -->
  <ellipse cx="200" cy="285" rx="60" ry="14" fill="url(#dbGrad)" stroke="#818cf8" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="140" y="285" width="120" height="52" fill="url(#dbGrad)" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
  <ellipse cx="200" cy="337" rx="60" ry="14" fill="url(#dbGrad)" stroke="#818cf8" stroke-opacity="0.5" stroke-width="1"/>
  <text x="200" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">orders</text>

  <!-- Outbox table below -->
  <ellipse cx="200" cy="378" rx="60" ry="14" fill="url(#outboxGrad)" stroke="#a78bfa" stroke-opacity="0.6" stroke-width="1"/>
  <rect x="140" y="378" width="120" height="52" fill="url(#outboxGrad)" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
  <ellipse cx="200" cy="430" rx="60" ry="14" fill="url(#outboxGrad)" stroke="#a78bfa" stroke-opacity="0.6" stroke-width="1"/>
  <text x="200" y="410" text-anchor="middle" font-family="monospace" font-size="10" fill="#ddd6fe">outbox_messages</text>

  <!-- Atomic brace -->
  <rect x="72" y="267" width="4" height="177" rx="2" fill="#6366f1" opacity="0.5"/>
  <text x="82" y="358" font-family="monospace" font-size="9" fill="#818cf8" opacity="0.8">atomic</text>
  <text x="82" y="370" font-family="monospace" font-size="9" fill="#818cf8" opacity="0.8">tx</text>

  <!-- Envelope icon in outbox -->
  <rect x="170" y="445" width="60" height="38" rx="4" fill="none" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="170" y1="445" x2="200" y2="465" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="230" y1="445" x2="200" y2="465" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="200" y="460" text-anchor="middle" font-family="monospace" font-size="8" fill="#c4b5fd" opacity="0.8">msg</text>

  <!-- ─── Publisher box (center) ─── -->
  <rect x="460" y="240" width="200" height="120" rx="12" fill="url(#cardGrad)" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="560" y="295" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#fde68a">Publisher</text>
  <text x="560" y="315" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400e" opacity="0.9">polls outbox</text>
  <!-- clock icon -->
  <circle cx="560" cy="338" r="10" fill="none" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="560" y1="330" x2="560" y2="338" stroke="#fbbf24" stroke-opacity="0.6" stroke-width="1.2"/>
  <line x1="560" y1="338" x2="566" y2="338" stroke="#fbbf24" stroke-opacity="0.6" stroke-width="1.2"/>

  <!-- ─── Message Broker box (right) ─── -->
  <rect x="800" y="200" width="280" height="220" rx="12" fill="url(#cardGrad)" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="940" y="230" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#6ee7b7">Message Broker</text>
  <line x1="800" y1="240" x2="1080" y2="240" stroke="#34d399" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Queue lines (Kafka-style) -->
  <rect x="828" y="260" width="44" height="18" rx="3" fill="#064e3b" stroke="#34d399" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="878" y="260" width="44" height="18" rx="3" fill="#064e3b" stroke="#34d399" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="928" y="260" width="44" height="18" rx="3" fill="#064e3b" stroke="#34d399" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="978" y="260" width="44" height="18" rx="3" fill="#064e3b" stroke="#34d399" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="1028" y="260" width="33" height="18" rx="3" fill="#065f46" stroke="#34d399" stroke-opacity="0.6" stroke-width="1"/>
  <text x="850" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#6ee7b7">evt</text>
  <text x="900" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#6ee7b7">evt</text>
  <text x="950" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#6ee7b7">evt</text>
  <text x="1000" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#6ee7b7">evt</text>
  <text x="1044" y="273" text-anchor="middle" font-family="monospace" font-size="7" fill="#a7f3d0">new</text>

  <!-- Second topic row -->
  <rect x="828" y="294" width="44" height="18" rx="3" fill="#064e3b" stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="878" y="294" width="44" height="18" rx="3" fill="#064e3b" stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
  <text x="940" y="307" text-anchor="middle" font-family="monospace" font-size="8" fill="#6ee7b7" opacity="0.5">topic partition</text>

  <!-- Consumer box inside broker area -->
  <rect x="828" y="334" width="224" height="60" rx="8" fill="#0f172a" stroke="#34d399" stroke-opacity="0.25" stroke-width="1"/>
  <text x="940" y="360" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#6ee7b7">Consumer</text>
  <text x="940" y="378" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" opacity="0.6">idempotent processing</text>

  <!-- ─── Arrows ─── -->

  <!-- Service → Publisher (outbox read) -->
  <line x1="340" y1="360" x2="455" y2="305" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrowAmber)"/>
  <text x="390" y="346" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.8">poll</text>

  <!-- Publisher → Broker -->
  <line x1="660" y1="300" x2="795" y2="300" stroke="#34d399" stroke-width="1.8" opacity="0.8" marker-end="url(#arrowGreen)"/>
  <text x="728" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" opacity="0.9">publish</text>

  <!-- Publisher → Service (mark processed) -->
  <path d="M 560 360 Q 560 490 340 480" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <text x="470" y="490" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8" opacity="0.7">mark sent</text>

  <!-- ─── Bottom tag row ─── -->
  <rect x="200" y="560" width="800" height="1" rx="0.5" fill="#6366f1" opacity="0.12"/>

  <text x="600" y="595" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b7280">
    atomic writes · at-least-once delivery · idempotency · dual-write safety · C#
  </text>
</svg>
