<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0e0c14" stop-opacity="0"/>
    </radialGradient>
    <!-- Indigo pill gradient -->
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#16131f"/>
    </linearGradient>
    <!-- Clip for rounded cards -->
    <clipPath id="cardClip0"><rect x="60" y="180" width="260" height="150" rx="10"/></clipPath>
    <clipPath id="cardClip1"><rect x="358" y="155" width="260" height="150" rx="10"/></clipPath>
    <clipPath id="cardClip2"><rect x="656" y="180" width="260" height="150" rx="10"/></clipPath>
    <clipPath id="cardClip3"><rect x="880" y="155" width="260" height="150" rx="10"/></clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#0e0c14"/>

  <!-- Radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#6366f1" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ── Card: Code ── -->
  <rect x="60" y="180" width="260" height="150" rx="10" fill="url(#cardGrad)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <!-- window dots -->
  <circle cx="84" cy="202" r="4" fill="#f87171" opacity="0.7"/>
  <circle cx="100" cy="202" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="116" cy="202" r="4" fill="#34d399" opacity="0.7"/>
  <!-- code lines -->
  <rect x="84" y="220" width="55" height="7" rx="3" fill="#818cf8" opacity="0.7"/>
  <rect x="148" y="220" width="40" height="7" rx="3" fill="#f472b6" opacity="0.5"/>
  <rect x="96" y="236" width="70" height="7" rx="3" fill="#6366f1" opacity="0.6"/>
  <rect x="175" y="236" width="30" height="7" rx="3" fill="#34d399" opacity="0.5"/>
  <rect x="96" y="252" width="45" height="7" rx="3" fill="#818cf8" opacity="0.5"/>
  <rect x="84" y="268" width="80" height="7" rx="3" fill="#6366f1" opacity="0.4"/>
  <rect x="84" y="284" width="55" height="7" rx="3" fill="#818cf8" opacity="0.6"/>
  <!-- label -->
  <text x="190" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8" opacity="0.9">&lt;/&gt; Code Blocks</text>

  <!-- ── Card: Math ── -->
  <rect x="358" y="155" width="260" height="150" rx="10" fill="url(#cardGrad)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <!-- math symbols -->
  <text x="488" y="225" text-anchor="middle" font-family="serif" font-size="36" fill="#818cf8" opacity="0.85">∑</text>
  <text x="540" y="220" text-anchor="start" font-family="serif" font-size="18" fill="#c7d2fe" opacity="0.7">f(x)</text>
  <!-- integral -->
  <text x="390" y="258" text-anchor="start" font-family="serif" font-size="28" fill="#6366f1" opacity="0.7">∫</text>
  <text x="408" y="255" text-anchor="start" font-family="serif" font-size="15" fill="#c7d2fe" opacity="0.6">e⁻ˣ² dx = √π</text>
  <!-- divider line (fraction) -->
  <rect x="430" y="238" width="80" height="1.5" rx="1" fill="#818cf8" opacity="0.4"/>
  <!-- label -->
  <text x="488" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8" opacity="0.9">∑ Math / LaTeX</text>

  <!-- ── Card: Diagrams ── -->
  <rect x="656" y="180" width="260" height="150" rx="10" fill="url(#cardGrad)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <!-- flowchart nodes -->
  <rect x="686" y="205" width="56" height="24" rx="5" fill="#6366f1" opacity="0.5"/>
  <text x="714" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#e0e7ff">Write</text>
  <!-- arrow -->
  <line x1="742" y1="217" x2="762" y2="217" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
  <polygon points="762,213 770,217 762,221" fill="#818cf8" opacity="0.7"/>
  <!-- diamond -->
  <polygon points="786,204 806,217 786,230 766,217" fill="#4f46e5" opacity="0.5"/>
  <text x="786" y="221" text-anchor="middle" font-family="monospace" font-size="7" fill="#e0e7ff">Draft?</text>
  <!-- arrow down -->
  <line x1="806" y1="217" x2="826" y2="217" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
  <polygon points="826,213 834,217 826,221" fill="#818cf8" opacity="0.7"/>
  <!-- end node -->
  <rect x="834" y="205" width="52" height="24" rx="12" fill="#34d399" opacity="0.4"/>
  <text x="860" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#d1fae5">Ship</text>
  <!-- sequence lines -->
  <line x1="690" y1="248" x2="690" y2="300" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="760" y1="248" x2="760" y2="300" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="830" y1="248" x2="830" y2="300" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="690" y1="258" x2="760" y2="258" stroke="#818cf8" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="272" x2="830" y2="272" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
  <line x1="830" y1="286" x2="690" y2="286" stroke="#818cf8" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
  <!-- label -->
  <text x="786" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8" opacity="0.9">⬡ Diagrams</text>

  <!-- ── Card: Embeds ── -->
  <rect x="880" y="155" width="260" height="150" rx="10" fill="url(#cardGrad)" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <!-- GitHub card mini -->
  <rect x="900" y="175" width="220" height="42" rx="6" fill="#1e1b2e" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="916" cy="196" r="8" fill="#6366f1" opacity="0.5"/>
  <rect x="930" y="189" width="80" height="6" rx="3" fill="#c7d2fe" opacity="0.6"/>
  <rect x="930" y="200" width="120" height="5" rx="2.5" fill="#6b7280" opacity="0.5"/>
  <rect x="1075" y="191" width="28" height="12" rx="6" fill="#6366f1" opacity="0.3"/>
  <text x="1089" y="201" text-anchor="middle" font-family="monospace" font-size="8" fill="#818cf8">★ 42</text>
  <!-- YouTube mini -->
  <rect x="900" y="228" width="220" height="42" rx="6" fill="#1a0a0a" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="900" y="228" width="220" height="42" rx="6" fill="#dc2626" fill-opacity="0.08"/>
  <!-- play button -->
  <circle cx="1010" cy="249" r="12" fill="#dc2626" opacity="0.7"/>
  <polygon points="1006,244 1018,249 1006,254" fill="white" opacity="0.9"/>
  <!-- YouTube text -->
  <text x="1030" y="253" text-anchor="start" font-family="sans-serif" font-size="9" fill="#fca5a5" opacity="0.7">YouTube</text>
  <!-- Callout mini -->
  <rect x="900" y="280" width="220" height="16" rx="4" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="900" y="280" width="3" height="16" rx="1" fill="#6366f1" opacity="0.8"/>
  <text x="910" y="292" font-family="monospace" font-size="8" fill="#818cf8" opacity="0.9">ℹ  Note · Tip · Warning · Danger</text>
  <!-- label -->
  <text x="1010" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8" opacity="0.9">⊞ Components</text>

  <!-- ── Central title area ── -->
  <!-- Top label -->
  <text x="600" y="95" text-anchor="middle" font-family="monospace" font-size="13" letter-spacing="4" fill="#6366f1" opacity="0.9">RAYBLOG</text>

  <!-- Main title -->
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9" letter-spacing="-1">Everything This Blog Can Do</text>

  <!-- Subtitle / feature pills row -->
  <g transform="translate(600, 370)">
    <!-- pill: code -->
    <rect x="-310" y="0" width="88" height="26" rx="13" fill="url(#pillGrad)" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="-266" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">&lt;/&gt; code</text>
    <!-- pill: math -->
    <rect x="-210" y="0" width="88" height="26" rx="13" fill="url(#pillGrad)" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="-166" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">∑ math</text>
    <!-- pill: diagrams -->
    <rect x="-110" y="0" width="108" height="26" rx="13" fill="url(#pillGrad)" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="-56" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">⬡ diagrams</text>
    <!-- pill: embeds -->
    <rect x="10" y="0" width="100" height="26" rx="13" fill="url(#pillGrad)" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="60" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">⊞ embeds</text>
    <!-- pill: footnotes -->
    <rect x="122" y="0" width="108" height="26" rx="13" fill="url(#pillGrad)" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1"/>
    <text x="176" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">¹ footnotes</text>
  </g>

  <!-- Bottom horizontal rule -->
  <rect x="200" y="440" width="800" height="1" rx="0.5" fill="#6366f1" opacity="0.15"/>

  <!-- Bottom: feature count line -->
  <text x="600" y="470" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b7280">
    code · math · mermaid · callouts · github · youtube · zoom · series · feeds
  </text>
</svg>
